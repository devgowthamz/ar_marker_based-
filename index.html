<!DOCTYPE html>
<html>
<head>
  <title>AR Box with Webcam</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
</head>
<body>

    <a-scene embedded arjs="sourceType: webcam; facingMode: user; debugUIEnabled: false;">
      
      <a-marker type="pattern" url="carPatt.patt">
        <a-box color="red" material="opacity: 0.5" scale="0.5 0.5 0.5"></a-box>
      </a-marker>

      <a-entity camera>
        <a-cursor></a-cursor>
      </a-entity>

    </a-scene>

</body>
</html>
